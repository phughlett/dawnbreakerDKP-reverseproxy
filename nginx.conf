user www-data;
worker_processes auto;
pid /run/nginx.pid;
include /etc/nginx/modules-enabled/*.conf;

events {
	worker_connections 1024;
}

http {
	# Proxy settings
         server {
            listen 443 ssl;
            server_name www.dawnbreaker.app dawnbreaker.app;
            ssl_certificate /etc/letsencrypt/live/www.dawnbreaker.app/fullchain.pem;
            ssl_certificate_key /etc/letsencrypt/live/www.dawnbreaker.app/privkey.pem;

            location / {
                proxy_pass          http://client:5000;
                proxy_set_header    X-Forwarded-For $remote_addr;
            }


            location /api/ {
                proxy_pass          http://server:8080/;
                    proxy_set_header Host $host;
                    proxy_set_header X-Real-IP $remote_addr;
            }
         }

        server {
            listen 80;
            server_name www.dawnbreaker.app dawnbreaker.app;

            location / {
                return 301 https://$host$request_uri;
            }
         }

}